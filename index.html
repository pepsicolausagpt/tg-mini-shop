<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин кастомизации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        .item-card {
            border: 2px solid var(--tg-theme-button-color, #2481cc);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <h2 id="greeting">Привет, покупатель!</h2>
    <p>Прокачай свой профиль в мессенджере 🚀</p>

    <div class="item-card">
        <h3>🌟 VIP Статус (1 месяц)</h3>
        <p>Цветной ник, анимированный аватар и приоритет в голосовых комнатах.</p>
        <button onclick="buyItem('VIP_STATUS')">Купить за 150 💎</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let userName = "Незнакомец";
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userName = tg.initDataUnsafe.user.first_name;
        }
        document.getElementById('greeting').innerText = `Привет, ${userName}!`;

        function buyItem(itemId) {
            tg.HapticFeedback.impactOccurred('heavy'); 
            tg.sendData(JSON.stringify({ action: 'buy', item: itemId }));
            tg.close();
        }
    </script>
</body>
</html>
